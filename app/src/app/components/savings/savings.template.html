<div fxLayout="column wrap" fxLayoutAlign="start center" [fxShow]="true">
  <div fxLayout="column wrap" class="standard-width" fxLayoutAlign="start stretch" [fxShow]="true">
    <div fxLayout="row wrap" class="border-btm-cyan-b fixed-width fixed z-index padding-0px-15px bg-blue height-50px" fxLayoutAlign="space-between center" [fxShow]="true">
      <div fxLayout="column wrap" class="color-w" fxFlex="15" fxLayoutAlign="start stretch" [fxShow]="true"><mat-icon class="pointer" routerLink="/logged_in_landing/home">arrow_back</mat-icon></div>
      <div fxLayout="column wrap" fxFlex="70" fxLayoutAlign="start center" [fxShow]="true">
        <h4 class="no-margin color-w poppins">
          Savings Account</h4>
      </div>
      <div fxLayout="column wrap" class="color-w" fxFlex="15" fxLayoutAlign="start stretch" [fxShow]="true">
        <div fxLayout="row wrap" fxLayoutAlign="end stretch" [fxShow]="true"><mat-icon class="color-w">search</mat-icon><mat-icon>more_vert</mat-icon></div>
      </div>
    </div>
    <div fxLayout="column wrap" class="margin-t-50px bg-blue" fxLayoutAlign="start stretch" [fxShow]="true">
      <div fxLayout="column wrap" class="border-radius-10px margin-t-l-r-10px bg-n-v" fxLayoutAlign="start stretch" [fxShow]="true">
        <div fxLayout="row wrap" class="height-60px" fxLayoutAlign="center center" [fxShow]="true">
          <div fxLayout="column wrap" fxFlex="90" fxLayoutAlign="start center" [fxShow]="true">
            <p class="no-margin poppins color-w">
              Available</p>
            <h3 class="poppins no-margin color-w">
              R9.08</h3>
          </div><mat-icon class="color-w">infor</mat-icon>
        </div>
      </div>
      <div fxLayout="column wrap" class="padding-right-10px" fxLayoutAlign="start center" [fxShow]="true"><small class="poppins color-w">
          Balance</small><small class="poppins color-w">
          R151.07</small></div>
    </div>
    <div fxLayout="column wrap" fxLayoutAlign="start stretch" [fxShow]="true"><mat-tab-group mat-align-tabs="start"><mat-tab label="All" class="hide-scrollbar full-height">
          <div fxLayout="column wrap" fxLayoutAlign="start stretch" [fxShow]="true">
            <div fxLayout="row wrap" fxLayoutAlign="space-between stretch" [fxShow]="true">
              <h4 class="no-margin poppins">
                May 2024</h4>
              <div fxLayout="row wrap" fxLayoutAlign="start stretch" [fxShow]="true">
                <h4 class="poppins no-margin color-b">
                  Statement</h4><mat-icon class="color-b">chevron_right</mat-icon>
              </div>
            </div>
          </div>
        </mat-tab><mat-tab label="Money In" class="hide-scrollbar"></mat-tab><mat-tab label="Money Out"></mat-tab><mat-tab label="Track"></mat-tab></mat-tab-group></div>
  </div>
</div>
